repos:
  - repo: local
    hooks:
      - id: build-doc-md
        name: Concatenate docs/ into doc/sia.md
        entry: bash scripts/build-doc.sh
        language: system
        files: ^docs/.*\.md$
        pass_filenames: false
        stages: [pre-commit]

  - repo: https://github.com/kdheepak/panvimdoc
    rev: v4.0.1
    hooks:
      - id: panvimdoc
        args:
          - "--project-name"
          - sia
          - "--input-file"
          - doc/sia.md
          - "--vim-version"
          - "Neovim >= 0.11"
          - "--toc"
          - "true"
          - "--treesitter"
          - "true"
          - "--dedup-subheadings"
          - "true"
          - "--ignore-rawblocks"
          - "true"
        stages: [pre-commit]

